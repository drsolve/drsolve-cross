name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # ──────────────────────────────────────────────────────────────
  # Linux: build FLINT + PML from source → static binary + test
  # ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils cmake

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"        >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"              >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Restore FLINT static install cache
        id: linux-flint-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: linux-flint-3.5-static-${{ runner.arch }}-v1

      - name: Build FLINT 3.5.0 (static)
        if: steps.linux-flint-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      - name: Save FLINT static install cache
        if: steps.linux-flint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: linux-flint-3.5-static-${{ runner.arch }}-v1
          
      - name: Configure (CMake, static)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRSOLVE_STATIC=ON \
            -DFLINT_ROOT="$INSTALL_PREFIX" \
            -DPML_ROOT="$INSTALL_PREFIX"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify static linkage
        run: |
          echo "=== ldd build/drsolve ==="
          ldd ./build/drsolve || true
          if ldd ./build/drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./build/drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./build/drsolve "dist/drsolve"
          cp ./drsolve_sage_interface.sage "dist/"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : drsolve
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.5.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/drsolve
            dist/drsolve_sage_interface.sage
            dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: build FLINT + PML from source → static binary + test
  # ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config cmake binutils

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                       >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                          >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                           >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"    >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Restore FLINT static install cache
        id: flint-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: macos-flint-3.5-static-renamed-${{ runner.arch }}-v1

      - name: Build FLINT 3.5.0 (static)
        if: steps.flint-cache.outputs.cache-hit != 'true'
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          find . -type f \( -name '*.c' -o -name '*.h' \) -print0 | xargs -0 perl -pi -e '
            s/\bnmod_mat_left_nullspace\b/flint_nmod_mat_left_nullspace/g;
            s/\bnmod_mat_nullspace\b/flint_nmod_mat_nullspace/g;
            s/\bfmpz_mat_nullspace\b/flint_fmpz_mat_nullspace/g;
            s/\bfmpz_mat_rank\b/flint_fmpz_mat_rank/g;
            s/\bfmpz_mat_solve\b/flint_fmpz_mat_solve/g;
          '
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Save FLINT static install cache
        if: steps.flint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: macos-flint-3.5-static-renamed-${{ runner.arch }}-v1

      - name: Verify renamed FLINT symbols
        run: |
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          for sym in \
            _nmod_mat_left_nullspace \
            _nmod_mat_nullspace \
            _fmpz_mat_nullspace \
            _fmpz_mat_rank \
            _fmpz_mat_solve; do
            sym_lines="$(nm -g "$FLINT_A" | grep -w "$sym" | grep -v ' U ' || true)"
            if [ -n "$sym_lines" ]; then
              echo "Error: original conflicting symbol $sym is still exported by FLINT."
              echo "$sym_lines"
              exit 1
            fi
          done
          echo "Success: FLINT no longer exports the original conflicting symbols."

      - name: Configure (CMake, static)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRSOLVE_STATIC=ON \
            -DCMAKE_C_FLAGS="-Dnmod_mat_nullspace=flint_nmod_mat_nullspace -Dfmpz_mat_nullspace=flint_fmpz_mat_nullspace -Dfmpz_mat_rank=flint_fmpz_mat_rank -Dfmpz_mat_solve=flint_fmpz_mat_solve" \
            -DFLINT_ROOT="$INSTALL_PREFIX" \
            -DPML_ROOT="$INSTALL_PREFIX"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify static linkage
        run: |
          echo "=== otool -L build/drsolve ==="
          otool -L ./build/drsolve
          if otool -L ./build/drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./build/drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./build/drsolve "dist/drsolve"
          cp ./drsolve_sage_interface.sage "dist/"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : drsolve
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.5.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/drsolve
            dist/drsolve_sage_interface.sage
            dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # Windows: cross-compile from Linux via MinGW-w64
      # Uses bundled mingw/ and pml_det/ dependencies — build + smoke-test
  # No binary upload (Windows installer handled separately)
  # ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            cmake make

      - name: Configure (CMake, MinGW cross-compile)
        run: |
          cmake -B build-win \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/cmake/toolchain-mingw64.cmake" \
            -DDRSOLVE_USE_BUNDLED_DEPS=OFF

      - name: Build
        run: cmake --build build-win -j$(nproc)

      - name: Verify executables exist
        run: |
          echo "=== build-win layout ==="
          find build-win -name "*.exe" -o -name "*.dll" | sort
          test -f build-win/drsolve.exe            || test -f build-win/bin/drsolve_cli_real.exe
          echo "OK: Windows build succeeded"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: drsolve-windows-x86_64
          path: |
            build-win/drsolve.exe
            build-win/drsolve_win_gui.exe
            build-win/bin/drsolve_cli_real.exe
            build-win/dll/
            build-win/lib/libdrsolve-1.a
            build-win/lib/libdrsolve-1.dll.a
          retention-days: 30
